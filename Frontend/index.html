<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <link rel="icon" type="image/svg+xml" href="/favicon.svg" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>frontend</title>
  </head>
  <body>
 <div id="root"></div>

    <script type="text/babel">
        const { useState, useEffect, useRef } = React;

        function App() {
            // State global yang dipakai bersama oleh Website & Mobile View
            const [page, setPage] = useState('splash');
            const [isDark, setIsDark] = useState(false);
            const [showQRIS, setShowQRIS] = useState(false);
            const [activeBill, setActiveBill] = useState(null);
            const fileInputRef = useRef(null);
            const [profileImage, setProfileImage] = useState(null);

            const [userData, setUserData] = useState({
                name: "Misbah",
                nim: "0110221001",
                email: "misbah@student.nurulfikri.ac.id",
                prodi: "Teknik Informatika"
            });

            const [formEdit, setFormEdit] = useState({ ...userData });
            const [formRegister, setFormRegister] = useState({
                name: "", nim: "", prodi: "Teknik Informatika", email: "", password: ""
            });

            const [balance, setBalance] = useState(4850000);
            const [transactions, setTransactions] = useState([
                { id: 1, title: 'Beasiswa KIP-K Smt 4', date: '14 Mei', amount: 4800000, type: 'CR' },
                { id: 2, title: 'Pembayaran UKT', date: '12 Mei', amount: 3500000, type: 'DB' },
                { id: 3, title: 'Kantin NF', date: '10 Mei', amount: 25000, type: 'DB' },
            ]);

            useEffect(() => {
                if (page === 'splash') setTimeout(() => setPage('login'), 2000);
            }, [page]);

            useEffect(() => {
                setFormEdit({ ...userData });
            }, [userData]);

            const addTransaction = (title, amount) => {
                if (balance < amount) {
                    alert("Saldo tidak mencukupi!");
                    return false;
                }
                setTransactions([{ id: Date.now(), title, date: 'Hari ini', amount, type: 'DB' }, ...transactions]);
                setBalance(balance - amount);
                setActiveBill(null);
                alert(`${title} Berhasil!`);
                return true;
            };

            const handleImageChange = (e) => {
                const file = e.target.files[0];
                if (file) {
                    const reader = new FileReader();
                    reader.onloadend = () => setProfileImage(reader.result);
                    reader.readAsDataURL(file);
                }
            };

            const saveSettings = () => {
                setUserData({ ...formEdit });
                alert("Pengaturan Berhasil Disimpan!");
                setPage('home');
            };

            const handleRegister = () => {
                if (!formRegister.name || !formRegister.nim || !formRegister.email || !formRegister.password) {
                    return alert("Harap isi semua field pendaftaran!");
                }
                setUserData({
                    name: formRegister.name,
                    nim: formRegister.nim,
                    email: formRegister.email,
                    prodi: formRegister.prodi
                });
                alert("Pendaftaran Berhasil!");
                setPage('home');
            };

            const handleQRISUpload = (e) => {
                const file = e.target.files[0];
                if (file) {
                    const nominalBayar = 20000;
                    const isSuccess = addTransaction("Bayar QRIS Toko/Kantin", nominalBayar);
                    if (isSuccess) setShowQRIS(false);
                    e.target.value = "";
                }
            };

            // Komponen Navigasi Bawah Mobile
            const Nav = () => (
                <div className={`absolute bottom-0 w-full h-20 border-t flex justify-around items-center px-4 z-40 ${isDark ? 'bg-slate-900 border-slate-800' : 'bg-white/95 backdrop-blur-md border-slate-100'}`}>
                    <button onClick={() => setPage('home')} className={`text-2xl ${page === 'home' ? 'opacity-100 scale-110' : 'opacity-20'}`}>🏠</button>
                    <button onClick={() => setShowQRIS(true)} className="w-14 h-14 bg-orange-600 rounded-full flex items-center justify-center -translate-y-5 shadow-lg border-4 border-white active:scale-95 transition-all">
                        <span className="text-white text-xl">📸</span>
                    </button>
                    <button onClick={() => setPage('profile')} className={`text-2xl ${page === 'profile' ? 'opacity-100 scale-110' : 'opacity-20'}`}>💳</button>
                </div>
            );

            return (
                <div className={`min-height-screen w-full flex flex-col lg:flex-row gap-8 p-4 lg:p-8 justify-center items-center ${isDark ? 'bg-slate-950' : 'bg-slate-100'}`}>
                    
                    {/* ========================================================================= */}
                    {/* BAGIAN KIRI: WEBSITE VIEW / DASHBOARD DESKTOP */}
                    {/* ========================================================================= */}
                    <div className={`flex-1 w-full max-w-4xl min-h-[812px] rounded-3xl p-8 shadow-xl border flex flex-col justify-between transition-all ${isDark ? 'bg-slate-900 border-slate-800 text-white' : 'bg-white border-slate-200 text-slate-800'}`}>
                        {/* Header Website */}
                        <div>
                            <div className="flex justify-between items-center border-b pb-6 mb-6 border-slate-200 dark:border-slate-700">
                                <div className="flex items-center gap-4">
                                    <div className="bg-white p-2 rounded-xl shadow-md border border-slate-100">
                                        <img src="img/sttnf.png" alt="Logo STT NF" className="h-10 object-contain"/>
                                    </div>
                                    <div>
                                        <h1 className="text-xl font-extrabold tracking-tight text-[#003366] dark:text-orange-500">Portal Keuangan KIP-K</h1>
                                        <p className="text-xs text-slate-400 font-semibold uppercase">Dashboard Monitoring Mahasiswa</p>
                                    </div>
                                </div>
                                <div className="text-right">
                                    <span className="px-4 py-2 bg-green-100 text-green-700 dark:bg-green-900/30 dark:text-green-400 text-xs font-bold rounded-full">Sistem Sinkron Aktif</span>
                                </div>
                            </div>

                            {/* Konten Utama Grid Website */}
                            <div className="grid grid-cols-1 md:grid-cols-3 gap-6">
                                {/* Kolom Data Diri */}
                                <div className="p-6 bg-slate-50 dark:bg-slate-800/50 rounded-2xl border dark:border-slate-800">
                                    <h3 className="text-xs font-black uppercase text-slate-400 tracking-wider mb-4">Profil Mahasiswa</h3>
                                    <div className="flex items-center gap-4 mb-4">
                                        {profileImage ? (
                                            <img src={profileImage} className="w-16 h-16 rounded-2xl object-cover border-2 border-orange-500 shadow" alt="Avatar"/>
                                        ) : (
                                            <div className="w-16 h-16 rounded-2xl bg-orange-600 text-white flex items-center justify-center font-black text-2xl shadow uppercase">{userData.name.substring(0,1)}</div>
                                        )}
                                        <div>
                                            <h4 className="font-extrabold text-base">{userData.name}</h4>
                                            <p className="text-xs font-mono text-slate-400">{userData.nim}</p>
                                        </div>
                                    </div>
                                    <div className="space-y-2 text-xs">
                                        <p><span className="opacity-60 block">Program Studi</span> <strong>{userData.prodi}</strong></p>
                                        <p><span className="opacity-60 block">Surel</span> <strong>{userData.email}</strong></p>
                                    </div>
                                </div>

                                {/* Kolom Saldo Informasi */}
                                <div className="p-6 card-gradient rounded-2xl text-white shadow-lg flex flex-col justify-between">
                                    <div>
                                        <p className="text-xs font-bold opacity-70 uppercase tracking-widest">Total Saldo Beasiswa</p>
                                        <h2 className="text-3xl font-black mt-2">Rp {balance.toLocaleString('id-ID')}</h2>
                                    </div>
                                    <div className="pt-4 border-t border-white/10 mt-4 flex justify-between items-center text-xs opacity-80">
                                        <span>KIP-K Terpadu NF</span>
                                        <span className="font-mono">Active Card</span>
                                    </div>
                                </div>

                                {/* Kolom Akses Cepat Quick Action */}
                                <div className="p-6 bg-slate-50 dark:bg-slate-800/50 rounded-2xl border dark:border-slate-800">
                                    <h3 className="text-xs font-black uppercase text-slate-400 tracking-wider mb-3">Layanan Cepat (Web)</h3>
                                    <div className="space-y-2">
                                        <button onClick={() => { let am = prompt("Nominal Top Up via Web:"); if(am) { setBalance(balance + parseInt(am)); setTransactions([{id:Date.now(), title:'Top Up (Web)', date:'Hari ini', amount:parseInt(am), type:'CR'}, ...transactions]) } }} className="w-full bg-[#003366] text-white py-2.5 px-4 rounded-xl text-xs font-bold shadow hover:bg-opacity-90 transition-all text-left flex justify-between">
                                            <span>Simulasi Tambah Saldo</span> <span>➔</span>
                                        </button>
                                        <button onClick={() => { setIsDark(!isDark) }} className="w-full bg-slate-200 dark:bg-slate-700 text-slate-800 dark:text-white py-2.5 px-4 rounded-xl text-xs font-bold text-left flex justify-between">
                                            <span>Ganti Mode Tema</span> <span>{isDark ? '☀️ Light' : '🌙 Dark'}</span>
                                        </button>
                                    </div>
                                </div>
                            </div>

                            {/* Tabel Riwayat Aktivitas Besar */}
                            <div className="mt-8">
                                <h3 className="text-sm font-black uppercase tracking-wider mb-4 text-slate-500">Log Riwayat Transaksi Lengkap</h3>
                                <div className="overflow-x-auto">
                                    <table className="w-full text-left border-collapse text-xs">
                                        <thead>
                                            <tr className="border-b border-slate-200 dark:border-slate-700 text-slate-400 uppercase font-bold">
                                                <th className="pb-3">Deskripsi Transaksi</th>
                                                <th className="pb-3">Tanggal</th>
                                                <th className="pb-3 text-right">Nominal</th>
                                            </tr>
                                        </thead>
                                        <tbody className="divide-y divide-slate-100 dark:divide-slate-800">
                                            {transactions.map(t => (
                                                <tr key={t.id} className="hover:bg-slate-50 dark:hover:bg-slate-800/30">
                                                    <td className="py-3 font-semibold flex items-center gap-2">
                                                        <span className={`w-2 h-2 rounded-full ${t.type === 'CR' ? 'bg-green-500' : 'bg-red-500'}`}></span>
                                                        {t.title}
                                                    </td>
                                                    <td className="py-3 text-slate-400">{t.date}</td>
                                                    <td className={`py-3 text-right font-bold ${t.type === 'CR' ? 'text-green-500' : 'text-red-500'}`}>
                                                        {t.type === 'CR' ? '+' : '-'} Rp {t.amount.toLocaleString('id-ID')}
                                                    </td>
                                                </tr>
                                            ))}
                                        </tbody>
                                    </table>
                                </div>
                            </div>
                        </div>

                        {/* Footer Portal Web */}
                        <div className="text-center text-[11px] text-slate-400 border-t pt-4 border-slate-100 dark:border-slate-800 mt-6">
                            © 2026 STT Terpadu Nurul Fikri • Smart Campus Solution Dashboard
                        </div>
                    </div>

                    {/* ========================================================================= */}
                    {/* BAGIAN KANAN: HANDPHONE INTERACTIVE VIEW */}
                    {/* ========================================================================= */}
                    <div className="iphone-frame-wrapper flex flex-col items-center">
                        <p className="text-xs font-bold text-slate-400 uppercase tracking-widest mb-2">Pratinjau Mobile App</p>
                        <div className={`iphone-frame ${isDark ? 'dark-mode' : ''}`}>
                            
                            {page === 'splash' && (
                                <div className="h-full bg-[#003366] flex flex-col items-center justify-center text-white">
                                    <div className="w-48 mb-4 p-4 bg-white rounded-2xl text-center">
                                        <img src="img/sttnf.png" alt="STT NF" className="w-48 mb-2 object-contain" />
                                        <p className="text-[#003366] font-black">STT NF</p>
                                    </div>
                                    <h1 className="text-xl font-extrabold tracking-widest mt-2">KIP-K MOBILE</h1>
                                    <p className="text-[10px] text-orange-400 font-bold uppercase mt-1">Smart Campus Solution</p>
                                </div>
                            )}

                            {page === 'login' && (
                                <div className="h-full p-8 flex flex-col page-enter justify-center">
                                    <div className="text-center">
                                        <div className="p-4 bg-white rounded-2xl shadow-sm mb-4 inline-block max-w-[150px]">
                                            <img src="img/sttnf.png" alt="Logo STT NF" className="w-full object-contain"/>
                                        </div>
                                        <h2 className="text-xl font-black text-[#003366] dark:text-white">Selamat Datang</h2>
                                        <p className="text-slate-400 text-[9px] font-bold uppercase tracking-widest mt-1">Akun Mobile KIP-K</p>
                                    </div>
                                    <div className="mt-8 space-y-3">
                                        <input type="text" placeholder="NIM" defaultValue={userData.nim} className="input-style text-xs" />
                                        <input type="password" placeholder="Password" defaultValue="******" className="input-style text-xs" />
                                        <button onClick={() => setPage('home')} className="w-full bg-[#003366] text-white py-3.5 rounded-xl font-black text-xs shadow-lg active:scale-95 transition-all">MASUK</button>
                                        <div className="text-center mt-2">
                                            <button onClick={() => setPage('register')} className="text-orange-600 font-extrabold text-[10px] underline uppercase">Daftar Disini</button>
                                        </div>
                                    </div>
                                </div>
                            )}

                            {page === 'register' && (
                                <div className="h-full p-6 pb-12 overflow-y-auto no-scrollbar flex flex-col page-enter">
                                    <div className="mt-4 flex items-center gap-4">
                                        <button onClick={() => setPage('login')} className="text-xl font-bold text-[#003366] dark:text-white">←</button>
                                        <h3 className="font-black text-sm text-[#003366] dark:text-white">Daftar Akun</h3>
                                    </div>
                                    <div className="mt-6 space-y-3 flex-1">
                                        <input type="text" placeholder="Nama Lengkap" value={formRegister.name} onChange={e => setFormRegister({...formRegister, name: e.target.value})} className="input-style text-xs" />
                                        <input type="text" placeholder="NIM" value={formRegister.nim} onChange={e => setFormRegister({...formRegister, nim: e.target.value})} className="input-style text-xs" />
                                        <select value={formRegister.prodi} onChange={e => setFormRegister({...formRegister, prodi: e.target.value})} className="input-style text-xs appearance-none cursor-pointer">
                                            <option value="Teknik Informatika">Teknik Informatika</option>
                                            <option value="Sistem Informasi">Sistem Informasi</option>
                                            <option value="Bisnis Digital">Bisnis Digital</option>
                                        </select>
                                        <input type="email" placeholder="Email Student" value={formRegister.email} onChange={e => setFormRegister({...formRegister, email: e.target.value})} className="input-style text-xs" />
                                        <input type="password" placeholder="Password" value={formRegister.password} onChange={e => setFormRegister({...formRegister, password: e.target.value})} className="input-style text-xs" />
                                        <button onClick={handleRegister} className="w-full bg-[#003366] text-white py-3.5 rounded-xl font-black text-[10px] uppercase tracking-widest shadow-lg mt-4">DAFTAR</button>
                                    </div>
                                </div>
                            )}

                            {page === 'home' && (
                                <div className="h-full pb-24 overflow-y-auto no-scrollbar page-enter">
                                    <div className="px-5 py-5 flex justify-between items-center">
                                        <div className="flex items-center gap-3">
                                            {profileImage ? (
                                                <img src={profileImage} className="w-9 h-9 rounded-xl object-cover border" alt="Avatar"/>
                                            ) : (
                                                <div className="w-9 h-9 rounded-xl bg-orange-600 text-white flex items-center justify-center font-bold text-sm uppercase">{userData.name.substring(0,1)}</div>
                                            )}
                                            <div>
                                                <p className="text-[9px] font-bold opacity-50 uppercase">Halo Mahasiswa,</p>
                                                <p className="text-xs font-black nf-blue-text dark:text-white">{userData.name}</p>
                                            </div>
                                        </div>
                                        <button onClick={() => setPage('settings')} className="p-2 rounded-xl bg-slate-100 dark:bg-slate-800 text-sm">⚙️</button>
                                    </div>

                                    <div className="px-5">
                                        <div className="p-5 card-gradient rounded-[2rem] text-white shadow-lg relative overflow-hidden">
                                            <p className="text-[9px] font-bold opacity-70 uppercase tracking-widest">Saldo Beasiswa</p>
                                            <h2 className="text-xl font-black mt-1">Rp {balance.toLocaleString('id-ID')}</h2>
                                            <div className="mt-6 flex justify-between items-center">
                                                <div className="px-2 py-0.5 bg-orange-500 rounded-full text-[8px] font-bold">STT-NF KIP-K</div>
                                                <p className="text-[9px] font-mono opacity-60">8802 {userData.nim.substring(0,4)} ****</p>
                                            </div>
                                        </div>
                                    </div>

                                    {/* Grid Layanan Menu Mobile */}
                                    <div className="grid grid-cols-4 gap-x-2 gap-y-4 px-5 mt-6">
                                        {[
                                            {l:'UKT', i:'🏦', a: () => setActiveBill({name: "Tagihan UKT Smt 5", price: 4500000})},
                                            {l:'Pulsa', i:'📱', a: () => { let n = prompt("Nomor HP:"); if(n) setActiveBill({name: `Pulsa (${n})`, price: 50000}) }},
                                            {l:'Internet', i:'🌐', a: () => setActiveBill({name: "Paket Data 25GB", price: 100000})},
                                            {l:'Listrik', i:'⚡', a: () => setActiveBill({name: "Token Listrik PLN", price: 200000})},
                                            {l:'Top Up', i:'➕', a: () => { let am = prompt("Nominal Top Up:"); if(am) { setBalance(balance + parseInt(am)); setTransactions([{id:Date.now(), title:'Top Up', date:'Hari ini', amount:parseInt(am), type:'CR'}, ...transactions]) } }},
                                            {l:'Tarik', i:'🏧', a: () => setActiveBill({name: "Tarik Tunai", price: 100000})},
                                            {l:'Zakat', i:'🌙', a: () => setActiveBill({name: "Infaq/Zakat", price: 50000})},
                                            {l:'Lainnya', i:'✨', a: () => alert("Fitur segera hadir!")}
                                        ].map((m,i)=>(
                                            <div key={i} onClick={m.a} className="flex flex-col items-center gap-1 cursor-pointer active:scale-90 transition-all">
                                                <div className="w-12 h-12 bg-slate-50 dark:bg-slate-800 rounded-xl flex items-center justify-center shadow-sm text-xl border dark:border-slate-700">{m.i}</div>
                                                <span className="text-[8px] font-black opacity-70 dark:text-white uppercase tracking-tighter text-center">{m.l}</span>
                                            </div>
                                        ))}
                                    </div>

                                    {/* Aktivitas Terakhir Mobile */}
                                    <div className="px-5 mt-6">
                                        <h3 className="text-[10px] font-black uppercase tracking-widest mb-3">Aktivitas Terakhir</h3>
                                        <div className="space-y-2">
                                            {transactions.slice(0, 3).map(t => (
                                                <div key={t.id} className="flex justify-between items-center p-3 bg-white dark:bg-slate-900 rounded-xl shadow-sm border dark:border-slate-800">
                                                    <div className="flex items-center gap-2">
                                                        <div className={`w-7 h-7 rounded-lg flex items-center justify-center text-[9px] font-bold ${t.type === 'CR' ? 'bg-green-100 text-green-600' : 'bg-red-100 text-red-600'}`}>
                                                            {t.type === 'CR' ? 'IN' : 'OUT'}
                                                        </div>
                                                        <div>
                                                            <p className="text-[9px] font-black">{t.title}</p>
                                                            <p className="text-[7px] font-bold opacity-40">{t.date}</p>
                                                        </div>
                                                    </div>
                                                    <p className={`text-[9px] font-black ${t.type === 'CR' ? 'text-green-600' : 'text-red-500'}`}>
                                                        {t.type === 'CR' ? '+' : '-'} {t.amount.toLocaleString('id-ID')}
                                                    </p>
                                                </div>
                                            ))}
                                        </div>
                                    </div>
                                    <Nav />
                                </div>
                            )}

                            {page === 'settings' && (
                                <div className="h-full pb-24 overflow-y-auto no-scrollbar page-enter p-5 flex flex-col">
                                    <div className="w-full flex items-center gap-4 mb-4">
                                        <button onClick={() => setPage('home')} className="text-xl font-bold">←</button>
                                        <h3 className="font-black text-sm">Pengaturan</h3>
                                    </div>
                                    <div className="flex flex-col items-center gap-2 mb-4">
                                        <div className="relative w-16 h-16 rounded-xl overflow-hidden border-2 border-orange-500 bg-slate-100 flex items-center justify-center">
                                            {profileImage ? <img src={profileImage} className="w-full h-full object-cover" alt="Profile" /> : <span className="text-xl">👤</span>}
                                        </div>
                                        <label className="text-[8px] bg-slate-100 dark:bg-slate-800 px-2 py-1 rounded font-bold cursor-pointer border uppercase shadow-sm">
                                            Pilih Gambar
                                            <input type="file" accept="image/*" onChange={handleImageChange} className="hidden" />
                                        </label>
                                    </div>

                                    <div className="space-y-3 flex-1 text-xs">
                                        <div>
                                            <label className="text-[8px] font-bold uppercase opacity-60 block mb-1">Nama Lengkap</label>
                                            <input type="text" value={formEdit.name} onChange={e => setFormEdit({...formEdit, name: e.target.value})} className="input-style !p-2.5 text-xs" />
                                        </div>
                                        <div>
                                            <label className="text-[8px] font-bold uppercase opacity-60 block mb-1">NIM</label>
                                            <input type="text" value={formEdit.nim} onChange={e => setFormEdit({...formEdit, nim: e.target.value})} className="input-style !p-2.5 text-xs" />
                                        </div>
                                        <div>
                                            <label className="text-[8px] font-bold uppercase opacity-60 block mb-1">Email</label>
                                            <input type="text" value={formEdit.email} onChange={e => setFormEdit({...formEdit, email: e.target.value})} className="input-style !p-2.5 text-xs" />
                                        </div>  
                                        <div className="flex justify-between items-center p-2.5 bg-slate-50 dark:bg-slate-800 rounded-xl border mt-2">
                                            <span className="text-[10px] font-bold uppercase opacity-70">Mode Gelap</span>
                                            <input type="checkbox" checked={isDark} onChange={() => setIsDark(!isDark)} className="w-4 h-4 accent-orange-500" />
                                        </div>
                                        <button onClick={saveSettings} className="w-full bg-orange-600 text-white py-3 rounded-xl font-black text-[10px] uppercase tracking-widest mt-2">Simpan</button>
                                    </div>
                                </div>
                            )}

                            {page === 'profile' && (
                                <div className="h-full page-enter p-5 flex flex-col relative">
                                    <div className="w-full flex items-center gap-4 mb-4">
                                        <button onClick={() => setPage('home')} className="text-xl">←</button>
                                        <h3 className="font-black text-sm">Kartu Mahasiswa</h3>
                                    </div>
                                    <div className="card-gradient w-full h-44 rounded-2xl p-4 text-white shadow-lg relative overflow-hidden mb-4 border border-white/10">
                                        <div className="flex justify-between items-start">
                                            <div className="bg-white/90 px-2 py-0.5 rounded text-black text-center">
                                         <img src="img/sttnf.png" alt="STT NF" className="w-10 h-auto object-contain" />
                                                <p className="font-black text-[8px]">STT NF</p>
                                            </div>
                                            {profileImage && <img src={profileImage} className="w-6 h-6 rounded object-cover border" alt="Mini"/>}
                                        </div>
                                        <p className="font-mono text-xs tracking-wider my-4">
                                            8802 {userData.nim.substring(0,4)} {userData.nim.substring(4,8)} 2026
                                        </p>
                                        <div className="flex justify-between items-end">
                                            <div>
                                                <p className="text-[6px] opacity-70 uppercase">Pemegang</p>
                                                <p className="text-[10px] font-bold uppercase">{userData.name}</p>
                                            </div>
                                            <div className="bg-orange-600 px-1.5 py-0.5 rounded text-[7px] font-black">KIP-K AKTIF</div>
                                        </div>
                                    </div>
                                    <Nav />
                                </div>
                            )}

                            {/* QRIS MODAL */}
                            {showQRIS && (
                                <div className="absolute inset-0 bg-[#001a33]/95 z-[100] flex flex-col items-center p-6 page-enter">
                                    <input type="file" ref={fileInputRef} accept="image/*" className="hidden" onChange={handleQRISUpload} />
                                    <div className="w-full flex justify-end">
                                        <button onClick={() => setShowQRIS(false)} className="text-white text-2xl p-2">✕</button>
                                    </div>
                                    <div className="flex-1 flex flex-col items-center justify-center w-full gap-4">
                                        <div className="w-48 h-48 border-4 border-orange-500 rounded-[2rem] relative overflow-hidden bg-white/10 flex items-center justify-center">
                                            <div className="w-full h-1 bg-orange-500 absolute top-0 animate-[scan_2s_linear_infinite]"></div>
                                            <p className="text-white/30 text-[8px] uppercase text-center p-4">Scan QRIS Area</p>
                                        </div>
                                        <button onClick={() => fileInputRef.current.click()} className="bg-white/10 p-4 rounded-xl border text-white text-[9px] font-bold uppercase tracking-widest">
                                            Galeri Foto QRIS
                                        </button>
                                    </div>
                                </div>
                            )}

                            {/* POPUP KONFIRMASI TAGIHAN */}
                            {activeBill && (
                                <div className="absolute inset-0 bg-black/60 z-[110] flex items-end justify-center">
                                    <div className="w-full bg-white dark:bg-slate-900 rounded-t-3xl p-6 page-enter border-t-4 border-orange-500">
                                        <h3 className="text-sm font-black mb-2 uppercase">Konfirmasi Pembayaran</h3>
                                        <div className="bg-slate-50 dark:bg-slate-800 p-3 rounded-xl mb-4 text-xs">
                                            <p className="text-sm font-black">{activeBill.name}</p>
                                            <p className="text-lg font-black text-orange-600 mt-1">Rp {activeBill.price.toLocaleString('id-ID')}</p>
                                        </div>
                                        <div className="flex gap-2">
                                            <button onClick={() => setActiveBill(null)} className="flex-1 py-3 bg-slate-100 dark:bg-slate-800 text-xs rounded-xl font-bold">BATAL</button>
                                            <button onClick={() => addTransaction(activeBill.name, activeBill.price)} className="flex-[2] py-3 bg-[#003366] text-white text-xs rounded-xl font-black">BAYAR</button>
                                        </div>
                                    </div>
                                </div>
                            )}

                        </div>
                    </div>

                </div>
            );
        }
    
    <div id="root"></div>
    <script type="module" src="/src/main.jsx"></script>
  </body>
</html>
